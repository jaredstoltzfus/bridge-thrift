  <div id="root"></div>

  <script type="text/babel-app" id="app-code">
    const { useState, useCallback, useMemo, useEffect } = React;
    const { BarChart, Bar, LineChart, Line, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = window.RechartsLib;

    // SVG Icon Components
    const Icons = {
      Menu: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,

      Plus: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,

      Search: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      Filter: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
      Home: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      Gift: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><path d="M12 7V5c0-1.1.9-2 2-2h0c1.1 0 2 .9 2 2v2M12 7V5c0-1.1-.9-2-2-2h0c-1.1 0-2 .9-2 2v2"/></svg>,
      Truck: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="1" y="6" width="22" height="12" rx="2"/><path d="M1 18v2a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2v-2"/><circle cx="8" cy="18" r="2"/><circle cx="18" cy="18" r="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>,
      BarChart3: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="3" x2="12" y2="21"/><line x1="18" y1="15" x2="18" y2="21"/><line x1="6" y1="9" x2="6" y2="21"/></svg>,
      Users: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
      Settings: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m3.08 3.08l4.24 4.24M1 12h6m6 0h6m-17.78 7.78l4.24-4.24m3.08-3.08l4.24-4.24"/></svg>,
      ShoppingCart: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>,
      MapPin: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
      User: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
    };

    // ============================================================================
    // DATA INITIALIZATION & STORAGE
    // ============================================================================

    const LOCATIONS = [
      { id: 1, name: 'Clairemont', phone: '858-352-6374', address: '4220 Balboa Ave', city: 'San Diego', state: 'CA' },
      { id: 2, name: 'Glassell Park', phone: '323-474-7890', address: '3516 N Eagle Rock Blvd', city: 'Los Angeles', state: 'CA' },
      { id: 3, name: 'Highland Park', phone: '323-474-6424', address: '5817 Figueroa St', city: 'Los Angeles', state: 'CA' },
      { id: 4, name: 'Spring Valley', phone: '619-470-1234', address: '9617 Campo Rd', city: 'Spring Valley', state: 'CA' },
      { id: 5, name: 'Pacific Beach', phone: '858-352-6087', address: '1772 Garnet Ave', city: 'San Diego', state: 'CA' }
    ];

    const CATEGORIES = [
      { id: 1, name: 'Clothing', value: 5, modules: ['Processing', 'Retail', 'Donations', 'Wholesale'] },
      { id: 2, name: 'Shoes', value: 4, modules: ['Processing', 'Retail', 'Donations', 'Wholesale'] },
      { id: 3, name: 'Jewelry', value: 8, modules: ['Retail', 'Donations'] },
      { id: 4, name: 'Accessories', value: 3, modules: ['Retail', 'Donations'] },
      { id: 5, name: 'Linens', value: 2, modules: ['Processing', 'Retail'] },
      { id: 6, name: 'Household', value: 6, modules: ['Retail', 'Donations'] },
      { id: 7, name: 'Electronics', value: 15, modules: ['Retail', 'Donations'] },
      { id: 8, name: 'Media', value: 2, modules: ['Retail'] },
      { id: 9, name: 'Furniture', value: 20, modules: ['Retail', 'Donations'] },
      { id: 10, name: 'Seasonal', value: 4, modules: ['Retail', 'Donations'] },
      { id: 11, name: 'Paper Bag', value: 0.50, modules: ['Donations'] },
      { id: 12, name: 'Outlet', value: 1, modules: ['Retail'] },
      { id: 13, name: 'Cash Adjustments', value: 0, modules: ['Retail'] }
    ];

    const PARTNERS = [
      'Hope for San Diego', 'Alpha Project', 'Barabbas Road Church', 'Bridge of Hope',
      'Second Chance', 'Wounded Warrior Project', 'We See You San Diego',
      'Mission Valley Christian Fellowship', 'St Vincent De Paul', 'Community Outreach',
      'Local Food Bank', 'Youth Services', 'Homeless Connect', 'Crisis Response Team'
    ];

    const initializeData = () => {
      return {
        donations: [],
        retailSummaries: [],
        processingSummaries: [],
        pickupsSummaries: [],
        truckStops: [],
        events: [],
        benevolenceGifts: [],
        donors: [],
        users: [
          { id: 1, name: 'Jared Stoltzfus', email: 'jared@bridgethrift.org', role: 'Admin' }
        ],
        callCenterSummaries: [],
        distributionSummaries: [],
        payrollSummaries: [],
        wholesaleSummaries: []
      };
    };

    // ============================================================================
    // UTILITY FUNCTIONS
    // ============================================================================

    const formatCurrency = (value) => {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(value);
    };

    const formatDate = (dateStr) => {
      return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    };

    // CSV Export
    const downloadCSV = (data, filename) => {
      if (!data || data.length === 0) {
        alert('No data to export');
        return;
      }
      const headers = Object.keys(data[0]);
      const csv = [
        headers.join(','),
        ...data.map(row => headers.map(header => {
          const val = row[header];
          if (typeof val === 'object') return JSON.stringify(val);
          if (typeof val === 'string' && val.includes(',')) return `"${val}"`;
          return val;
        }).join(','))
      ].join('\n');

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      window.URL.revokeObjectURL(url);
    };

    // ============================================================================
    // TARGETS - CSV UPLOAD & STORAGE
    // ============================================================================

    // Map Google Sheet location codes to app location IDs
    const LOCATION_CODE_TO_ID = {
      '302': 1,   // Clairemont
    };
    const LOCATION_ID_TO_CODE = { 1: '302' };

    const parseCSVLine = (line) => {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        if (line[i] === '"') {
          inQuotes = !inQuotes;
        } else if (line[i] === ',' && !inQuotes) {
          result.push(current);
          current = '';
        } else {
          current += line[i];
        }
      }
      result.push(current);
      return result;
    };

    const parseCSV = (text) => {
      const lines = text.split('\n').filter(l => l.trim());
      if (lines.length < 2) return [];
      const headers = parseCSVLine(lines[0]).map(h => h.trim().replace(/^"|"$/g, ''));
      return lines.slice(1).map(line => {
        const values = parseCSVLine(line);
        const obj = {};
        headers.forEach((h, i) => {
          obj[h] = (values[i] || '').trim().replace(/^"|"$/g, '');
        });
        return obj;
      });
    };

    // Detect CSV format and parse targets accordingly
    const parseTargetsCSV = (text) => {
      const lines = text.split('\n').filter(l => l.trim());
      if (lines.length < 2) return { daily: [], monthly: {}, loaded: true };

      const firstLine = lines[0].toLowerCase();

      // Check if this is the "Targets" tab format (has Type, Date, Location ID columns)
      if (firstLine.includes('type') && firstLine.includes('date') && firstLine.includes('location')) {
        const rows = parseCSV(text);
        const daily = rows.map(row => ({
          type: (row['Type'] || '').toLowerCase(),
          date: row['Date'] || '',
          locationCode: row['Location ID'] || '',
          locationId: LOCATION_CODE_TO_ID[row['Location ID']] || null,
          amount1: parseFloat(row['Amount 1']) || 0,
          amount2: parseFloat(row['Amount 2']) || 0,
          amount3: parseFloat(row['Amount 3']) || 0,
          amount4: parseFloat(row['Amount 4']) || 0,
        }));

        // Aggregate daily targets into monthly
        const now = new Date();
        const currentMonth = now.getMonth();
        const currentYear = now.getFullYear();
        const monthlyDays = daily.filter(d => {
          const dt = new Date(d.date);
          return dt.getMonth() === currentMonth && dt.getFullYear() === currentYear && d.type === 'retail';
        });
        const monthlySalesTarget = monthlyDays.reduce((sum, d) => sum + d.amount1, 0);

        return {
          daily,
          monthly: monthlySalesTarget > 0 ? {
            salesTarget: monthlySalesTarget,
            avgDailySales: monthlyDays.length > 0 ? monthlySalesTarget / monthlyDays.length : 0,
            productionValue: 0,
            productionTarget: 0,
            avgPricePerPiece: 0,
            sellThroughTarget: 0,
            retailLabor: 0,
            processingLabor: 0,
            piecesPerHour: 0,
            avgDailyProduction: 0,
          } : {},
          loaded: true,
        };
      }

      // Check if this is the "Dashboard" tab format (matrix layout)
      // Row 0 = Store Name, Row 1 = Location ID, Row 2 = Start Date, etc.
      const allRows = lines.map(line => parseCSVLine(line).map(v => v.trim().replace(/^"|"$/g, '')));
      if (allRows.length > 5 && (allRows[0][0] || '').toLowerCase().includes('store')) {
        const now = new Date();
        const currentMonth = now.getMonth();
        const currentYear = now.getFullYear();

        let targetCol = -1;
        if (allRows.length > 2) {
          for (let c = 1; c < allRows[2].length; c++) {
            const startDate = allRows[2][c];
            if (startDate) {
              const d = new Date(startDate);
              if (d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
                targetCol = c;
                break;
              }
            }
          }
          if (targetCol === -1 && allRows[2]) {
            targetCol = allRows[2].length - 1;
          }
        }

        if (targetCol > 0) {
          const getVal = (rowIdx) => {
            if (allRows[rowIdx] && allRows[rowIdx][targetCol]) {
              return parseFloat(allRows[rowIdx][targetCol].replace(/[$,%]/g, '')) || 0;
            }
            return 0;
          };

          return {
            daily: [],
            monthly: {
              salesTarget: getVal(4),
              retailLabor: getVal(5),
              productionValue: getVal(8),
              processingLabor: getVal(9),
              avgPricePerPiece: getVal(10),
              sellThroughTarget: getVal(11),
              productionTarget: getVal(12),
              piecesPerHour: getVal(13),
              avgDailySales: getVal(15),
              avgDailyProduction: getVal(16),
            },
            loaded: true,
          };
        }
      }

      // Generic fallback: try to parse as key-value or simple table
      const rows = parseCSV(text);
      return { daily: [], monthly: {}, rawRows: rows, loaded: true };
    };

    // Save/load targets from localStorage
    const saveTargets = (targets) => {
      try {
        localStorage.setItem('bridge_thrift_targets', JSON.stringify(targets));
      } catch (e) {
        console.warn('Could not save targets to localStorage:', e);
      }
    };

    const loadSavedTargets = () => {
      try {
        const saved = localStorage.getItem('bridge_thrift_targets');
        if (saved) return JSON.parse(saved);
      } catch (e) {
        console.warn('Could not load saved targets:', e);
      }
      return { daily: [], monthly: {}, loaded: false };
    };

    // ============================================================================
    // TARGET DISPLAY COMPONENTS
    // ============================================================================

    const ProgressBar = ({ actual, target, label, format = 'currency' }) => {
      const pct = target > 0 ? Math.min((actual / target) * 100, 150) : 0;
      const displayPct = target > 0 ? ((actual / target) * 100).toFixed(1) : '0.0';
      const barColor = pct >= 100 ? '#4CAF50' : pct >= 75 ? '#FF9800' : '#f44336';
      const formatVal = (v) => format === 'currency' ? formatCurrency(v) : format === 'percent' ? v.toFixed(1) + '%' : v.toLocaleString();

      return (
        <div className="mb-3">
          <div className="flex justify-between text-sm mb-1">
            <span className="text-gray-600">{label}</span>
            <span className="font-medium">{formatVal(actual)} / {formatVal(target)} ({displayPct}%)</span>
          </div>
          <div className="w-full bg-gray-200 rounded-full h-3">
            <div className="h-3 rounded-full transition-all duration-500" style={{ width: Math.min(pct, 100) + '%', backgroundColor: barColor }} />
          </div>
        </div>
      );
    };

    const TargetsSummaryCard = ({ targets, totalSales, totalUnits, avgPrice }) => {
      const monthly = targets.monthly || {};
      if (!targets.loaded || !monthly.salesTarget) {
        return (
          <div className="bg-white p-6 rounded-lg border border-gray-200">
            <h3 className="font-semibold mb-2 text-gray-900">Monthly Targets</h3>
            <p className="text-sm text-gray-500">
              No targets uploaded yet. Go to Administration &gt; Targets to upload a CSV from your Google Sheet.
            </p>
          </div>
        );
      }

      return (
        <div className="bg-white p-6 rounded-lg border border-gray-200">
          <h3 className="font-semibold mb-4 text-gray-900">Monthly Targets vs Actuals</h3>
          <ProgressBar actual={totalSales} target={monthly.salesTarget} label="Sales" />
          {monthly.productionValue > 0 && <ProgressBar actual={totalSales * 1.3} target={monthly.productionValue} label="Production Value" />}
          {monthly.productionTarget > 0 && <ProgressBar actual={totalUnits} target={monthly.productionTarget} label="Units Produced" format="number" />}
          {monthly.avgPricePerPiece > 0 && <ProgressBar actual={avgPrice} target={monthly.avgPricePerPiece} label="Avg Price/Piece" />}
          {monthly.sellThroughTarget > 0 && <ProgressBar actual={0} target={monthly.sellThroughTarget} label="Sell-Through %" format="percent" />}
        </div>
      );
    };

    // ============================================================================
    // TARGETS MANAGEMENT PAGE
    // ============================================================================

    const TargetsManagement = ({ targets, onTargetsUpdate }) => {
      const [uploading, setUploading] = useState(false);
      const [uploadStatus, setUploadStatus] = useState(null);
      const [dragOver, setDragOver] = useState(false);

      const handleFile = (file) => {
        if (!file) return;
        setUploading(true);
        setUploadStatus(null);

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const text = e.target.result;
            const parsed = parseTargetsCSV(text);
            parsed.uploadedAt = new Date().toISOString();
            parsed.fileName = file.name;
            saveTargets(parsed);
            onTargetsUpdate(parsed);
            setUploadStatus({ type: 'success', message: `Loaded ${parsed.daily.length} daily targets from "${file.name}". ${parsed.monthly.salesTarget ? 'Monthly sales target: ' + formatCurrency(parsed.monthly.salesTarget) : ''}` });
          } catch (err) {
            setUploadStatus({ type: 'error', message: 'Failed to parse file: ' + err.message });
          }
          setUploading(false);
        };
        reader.onerror = () => {
          setUploadStatus({ type: 'error', message: 'Failed to read file.' });
          setUploading(false);
        };
        reader.readAsText(file);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setDragOver(false);
        const file = e.dataTransfer.files[0];
        if (file && (file.name.endsWith('.csv') || file.type === 'text/csv')) {
          handleFile(file);
        } else {
          setUploadStatus({ type: 'error', message: 'Please upload a CSV file.' });
        }
      };

      const handleClear = () => {
        localStorage.removeItem('bridge_thrift_targets');
        onTargetsUpdate({ daily: [], monthly: {}, loaded: false });
        setUploadStatus({ type: 'success', message: 'Targets cleared.' });
      };

      return (
        <div className="space-y-6">
          <div className="flex justify-between items-center">
            <h2 className="text-2xl font-bold text-gray-900">Sales Targets</h2>
            {targets.loaded && targets.monthly.salesTarget && (
              <button onClick={handleClear} className="px-4 py-2 text-sm text-red-600 border border-red-300 rounded-lg hover:bg-red-50">
                Clear Targets
              </button>
            )}
          </div>

          {/* Upload Section */}
          <div className="bg-white p-6 rounded-lg border border-gray-200">
            <h3 className="font-semibold mb-2 text-gray-900">Upload Targets</h3>
            <p className="text-sm text-gray-600 mb-4">
              Export your Google Sheet as CSV and upload it here. The website will read the targets and update the dashboard automatically.
            </p>
            <div className="flex items-center gap-3 mb-4 text-sm text-gray-500">
              <span className="font-medium">How to export:</span>
              <span>Open Google Sheet → File → Download → Comma-separated values (.csv)</span>
            </div>
            <div
              onDrop={handleDrop}
              onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              className={`border-2 border-dashed rounded-lg p-8 text-center transition ${dragOver ? 'border-green-500 bg-green-50' : 'border-gray-300 hover:border-green-400'}`}
            >
              <Icons.Download size={32} className="mx-auto mb-3 text-gray-400" />
              <p className="text-gray-600 mb-2">Drag and drop a CSV file here, or</p>
              <label className="inline-flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg text-sm cursor-pointer hover:bg-green-700">
                <span>Choose File</span>
                <input
                  type="file"
                  accept=".csv"
                  className="hidden"
                  onChange={(e) => handleFile(e.target.files[0])}
                />
              </label>
              {uploading && <p className="mt-3 text-sm text-gray-500">Processing...</p>}
            </div>

            {uploadStatus && (
              <div className={`mt-4 p-3 rounded-lg text-sm ${uploadStatus.type === 'success' ? 'bg-green-50 text-green-800 border border-green-200' : 'bg-red-50 text-red-800 border border-red-200'}`}>
                {uploadStatus.message}
              </div>
            )}
          </div>

          {/* Connection Status */}
          <div className="bg-white p-6 rounded-lg border border-gray-200">
            <div className="flex items-center gap-2 mb-3">

      return (
        <div className="flex flex-col items-center">

            <svg viewBox="0 0 200 100" className="w-full h-full">

              <line
                x1="100" y1="100" x2={100 + 70 * Math.cos((rotation * Math.PI) / 180)}
                y1={100 + 70 * Math.sin((rotation * Math.PI) / 180)}
                stroke="#333" strokeWidth="4" strokeLinecap="round"
              />
              <circle cx="100" cy="100" r="6" fill="#333" />
              <text x="100" y="130" textAnchor="middle" fontSize="16" fontWeight="bold" fill="#333">

        donorFirstName: '',

        donorEmail: '',
        donorPhone: '',
        partner: '',
        status: 'Scheduled',
        totalItems: 0,
        suggestedValue: 0,
        totalValue: 0
      });

      const filteredDonations = data.donations.filter(d => {
        if (d.locationId !== selectedLocation) return false;
        if (filterStatus !== 'all' && d.status !== filterStatus) return false;
        if (searchTerm) {
          const term = searchTerm.toLowerCase();
          return d.donorFirstName.toLowerCase().includes(term) ||
            d.donorLastName.toLowerCase().includes(term) ||
            d.id.toLowerCase().includes(term);
        }
        return true;

          date: new Date().toISOString().split('T')[0],

          donorLastName: '',
          donorEmail: '',

          </div>
        </div>
      );
    };

    // Categories Administration
    const CategoriesModule = ({ data, onDataChange }) => {
      const [showForm, setShowForm] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [formData, setFormData] = useState({
        name: '',
        value: 0,
        modules: []
      });

      const handleSubmit = () => {
        setShowForm(false);
        setFormData({ name: '', value: 0, modules: [] });
      };

      return (
        <div className="space-y-4">
          <div className="flex justify-between items-center">
            <h2 className="text-2xl font-bold text-gray-900">Categories</h2>
            <button
              onClick={() => setShowForm(!showForm)}
              className="bg-green-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-green-700"
            >
              <Icons.Plus size={18} />
              New Category
            </button>
          </div>

          {showForm && (
            <div className="bg-white p-6 rounded-lg border border-gray-200">
              <h3 className="font-semibold mb-4">{editingId ? 'Edit' : 'New'} Category</h3>
              <div className="grid grid-cols-2 gap-4">
                <input type="text" placeholder="Name" value={formData.name} onChange={(e) => setFormData({ ...formData, name: e.target.value })} className="px-3 py-2 border border-gray-300 rounded" />
                <input type="number" placeholder="Value" step="0.01" value={formData.value} onChange={(e) => setFormData({ ...formData, value: Number(e.target.value) })} className="px-3 py-2 border border-gray-300 rounded" />
              </div>
              <div className="flex gap-2 mt-4">
                <button onClick={handleSubmit} className="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Save</button>
                <button onClick={() => { setShowForm(false); setEditingId(null); }} className="bg-gray-300 px-4 py-2 rounded hover:bg-gray-400">Cancel</button>
              </div>
            </div>
          )}

          <div className="bg-white rounded-lg border border-gray-200 overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b">
                <tr>
                  <th className="text-left px-4 py-3 font-semibold">Name</th>
                  <th className="text-right px-4 py-3 font-semibold">Value</th>
                  <th className="text-left px-4 py-3 font-semibold">Modules</th>
                  <th className="text-center px-4 py-3 font-semibold">Actions</th>
                </tr>
              </thead>
              <tbody>
                {CATEGORIES.map(c => (
                  <tr key={c.id} className="border-b hover:bg-gray-50">
                    <td className="px-4 py-3">{c.name}</td>
                    <td className="text-right px-4 py-3">{formatCurrency(c.value)}</td>
                    <td className="px-4 py-3 text-xs">{c.modules.join(', ')}</td>
                    <td className="text-center px-4 py-3 flex gap-2 justify-center">
                      <button onClick={() => { setEditingId(c.id); setFormData(c); setShowForm(true); }} className="text-blue-600 hover:text-blue-800"><Icons.Edit2 size={16} /></button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // Locations Administration
    const LocationsModule = ({ data, onDataChange }) => {
      const [showForm, setShowForm] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [formData, setFormData] = useState({
        name: '',
        phone: '',
        address: '',
        city: '',
        state: ''
      });

      const handleSubmit = () => {
        setShowForm(false);
        setFormData({ name: '', phone: '', address: '', city: '', state: '' });
      };

      return (
        <div className="space-y-4">
          <div className="flex justify-between items-center">
            <h2 className="text-2xl font-bold text-gray-900">Locations</h2>
            <button
              onClick={() => setShowForm(!showForm)}
              className="bg-green-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-green-700"
            >
              <Icons.Plus size={18} />
              New Location
            </button>
          </div>

          {showForm && (
            <div className="bg-white p-6 rounded-lg border border-gray-200">
              <h3 className="font-semibold mb-4">{editingId ? 'Edit' : 'New'} Location</h3>
              <div className="grid grid-cols-2 gap-4">
                <input type="text" placeholder="Name" value={formData.name} onChange={(e) => setFormData({ ...formData, name: e.target.value })} className="px-3 py-2 border border-gray-300 rounded" />
                <input type="tel" placeholder="Phone" value={formData.phone} onChange={(e) => setFormData({ ...formData, phone: e.target.value })} className="px-3 py-2 border border-gray-300 rounded" />
                <input type="text" placeholder="Address" value={formData.address} onChange={(e) => setFormData({ ...formData, address: e.target.value })} className="px-3 py-2 border border-gray-300 rounded col-span-2" />
                <input type="text" placeholder="City" value={formData.city} onChange={(e) => setFormData({ ...formData, city: e.target.value })} className="px-3 py-2 border border-gray-300 rounded" />
                <input type="text" placeholder="State" value={formData.state} onChange={(e) => setFormData({ ...formData, state: e.target.value })} className="px-3 py-2 border border-gray-300 rounded" />
              </div>
              <div className="flex gap-2 mt-4">
                <button onClick={handleSubmit} className="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Save</button>
                <button onClick={() => { setShowForm(false); setEditingId(null); }} className="bg-gray-300 px-4 py-2 rounded hover:bg-gray-400">Cancel</button>
              </div>
            </div>
          )}

          <div className="bg-white rounded-lg border border-gray-200 overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b">
                <tr>
                  <th className="text-left px-4 py-3 font-semibold">Name</th>
                  <th className="text-left px-4 py-3 font-semibold">Phone</th>
                  <th className="text-left px-4 py-3 font-semibold">Address</th>
                  <th className="text-left px-4 py-3 font-semibold">City</th>
                  <th className="text-left px-4 py-3 font-semibold">State</th>
                  <th className="text-center px-4 py-3 font-semibold">Actions</th>
                </tr>
              </thead>
              <tbody>
                {LOCATIONS.map(l => (
                  <tr key={l.id} className="border-b hover:bg-gray-50">
                    <td className="px-4 py-3 font-medium">{l.name}</td>
                    <td className="px-4 py-3">{l.phone}</td>
                    <td className="px-4 py-3">{l.address}</td>
                    <td className="px-4 py-3">{l.city}</td>
                    <td className="px-4 py-3">{l.state}</td>
                    <td className="text-center px-4 py-3 flex gap-2 justify-center">
                      <button onClick={() => { setEditingId(l.id); setFormData(l); setShowForm(true); }} className="text-blue-600 hover:text-blue-800"><Icons.Edit2 size={16} /></button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // Generic List Module
    const ListModule = ({ title, data, columns, onEdit, onDelete }) => {
      return (
        <div className="space-y-4">
          <h2 className="text-2xl font-bold text-gray-900">{title}</h2>
          <div className="bg-white rounded-lg border border-gray-200 overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b">
                <tr>
                  {columns.map(col => (
                    <th key={col} className="text-left px-4 py-3 font-semibold">{col}</th>
                  ))}
                  <th className="text-center px-4 py-3 font-semibold">Actions</th>
                </tr>
              </thead>
              <tbody>
                {data.length === 0 ? (
                  <tr><td colSpan={columns.length + 1} className="px-4 py-3 text-center text-gray-500">No data</td></tr>
                ) : (
                  data.map((item, idx) => (
                    <tr key={idx} className="border-b hover:bg-gray-50">
                      {columns.map(col => (
                        <td key={col} className="px-4 py-3">
                          {typeof item[col] === 'number' && item[col] > 100 ? formatCurrency(item[col]) : String(item[col])}
                        </td>
                      ))}
                      <td className="text-center px-4 py-3 flex gap-2 justify-center">
                        <button onClick={() => onEdit(idx)} className="text-blue-600 hover:text-blue-800"><Icons.Edit2 size={16} /></button>
                        <button onClick={() => onDelete(idx)} className="text-red-600 hover:text-red-800"><Icons.Trash2 size={16} /></button>
                      </td>
                    </tr>
                  ))
                )}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // Pickups Module
    const PickupsModule = ({ data, selectedLocation, onDataChange }) => {
      const [showForm, setShowForm] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [formData, setFormData] = useState({
        date: new Date().toISOString().split('T')[0],
        locationId: selectedLocation,
        donor: '',
        items: 0
      });

      const filteredPickups = data.pickupsSummaries.filter(p => p.locationId === selectedLocation);

      const handleSubmit = () => {
        if (editingId) {
          onDataChange({
            ...data,
            pickupsSummaries: data.pickupsSummaries.map(p => p.id === editingId ? { ...formData, id: editingId } : p)
          });
          setEditingId(null);
        } else {
          onDataChange({
            ...data,
            pickupsSummaries: [...data.pickupsSummaries, { ...formData, id: `PICK-${Date.now()}` }]
          });
        }
        setShowForm(false);
        setFormData({
          date: new Date().toISOString().split('T')[0],
          locationId: selectedLocation,
          donor: '',
          items: 0
        });
      };

      return (
        <div className="space-y-4">
          <div className="flex justify-between items-center">
            <h2 className="text-2xl font-bold text-gray-900">Pickups</h2>
            <button
              onClick={() => setShowForm(!showForm)}
              className="bg-green-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-green-700"
            >
              <Icons.Plus size={18} />
              New Pickup
            </button>
          </div>

          {showForm && (
            <div className="bg-white p-6 rounded-lg border border-gray-200">
              <h3 className="font-semibold mb-4">{editingId ? 'Edit' : 'New'} Pickup</h3>
              <div className="grid grid-cols-2 gap-4">
                <input type="date" value={formData.date} onChange={(e) => setFormData({ ...formData, date: e.target.value })} className="px-3 py-2 border border-gray-300 rounded" />
                <input type="text" placeholder="Donor" value={formData.donor} onChange={(e) => setFormData({ ...formData, donor: e.target.value })} className="px-3 py-2 border border-gray-300 rounded" />
                <input type="number" placeholder="Items" value={formData.items} onChange={(e) => setFormData({ ...formData, items: Number(e.target.value) })} className="px-3 py-2 border border-gray-300 rounded col-span-2" />
              </div>
              <div className="flex gap-2 mt-4">
                <button onClick={handleSubmit} className="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Save</button>
                <button onClick={() => { setShowForm(false); setEditingId(null); }} className="bg-gray-300 px-4 py-2 rounded hover:bg-gray-400">Cancel</button>
              </div>
            </div>
          )}

          <div className="bg-white rounded-lg border border-gray-200 overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b">
                <tr>
                  <th className="text-left px-4 py-3 font-semibold">Date</th>
                  <th className="text-left px-4 py-3 font-semibold">Donor</th>
                  <th className="text-right px-4 py-3 font-semibold">Items</th>
                  <th className="text-center px-4 py-3 font-semibold">Actions</th>
                </tr>
              </thead>
              <tbody>
                {filteredPickups.map(p => (
                  <tr key={p.id} className="border-b hover:bg-gray-50">
                    <td className="px-4 py-3">{formatDate(p.date)}</td>
                    <td className="px-4 py-3">{p.donor}</td>
                    <td className="text-right px-4 py-3">{p.items}</td>
                    <td className="text-center px-4 py-3 flex gap-2 justify-center">
                      <button onClick={() => { setEditingId(p.id); setFormData(p); setShowForm(true); }} className="text-blue-600 hover:text-blue-800"><Icons.Edit2 size={16} /></button>
                      <button onClick={() => onDataChange({ ...data, pickupsSummaries: data.pickupsSummaries.filter(x => x.id !== p.id) })} className="text-red-600 hover:text-red-800"><Icons.Trash2 size={16} /></button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // ============================================================================
    // MAIN APPLICATION
    // ============================================================================

    function BridgeThriftApp() {
      const [data, setData] = useState(initializeData());
      const [selectedLocation, setSelectedLocation] = useState(1);
      const [activeSection, setActiveSection] = useState('overview');
      const [targets, setTargets] = useState(() => loadSavedTargets());

      const renderContent = () => {
        const location = LOCATIONS.find(l => l.id === selectedLocation);

        switch (activeSection) {
          case 'overview':
            return <DashboardOverview data={data} selectedLocation={selectedLocation} locations={LOCATIONS} targets={targets} />;
          case 'metrics-processing':
            return <ProcessingMetricsModule data={data} selectedLocation={selectedLocation} onDataChange={setData} />;
          case 'metrics-retail':
            return <RetailMetricsModule data={data} selectedLocation={selectedLocation} locations={LOCATIONS} onDataChange={setData} />;
          case 'admin-categories':
            return <CategoriesModule data={data} onDataChange={setData} />;
          case 'admin-locations':
            return <LocationsModule data={data} onDataChange={setData} />;
          case 'admin-users':
            return <ListModule title="Users" data={data.users} columns={['name', 'email', 'role']} onEdit={() => {}} onDelete={(idx) => setData({ ...data, users: data.users.filter((_, i) => i !== idx) })} />;
          case 'admin-targets':
            return <TargetsManagement targets={targets} onTargetsUpdate={setTargets} />;
          case 'people-donors':
            return <ListModule title="Donors" data={data.donors} columns={['firstName', 'lastName', 'email', 'phone']} onEdit={() => {}} onDelete={(idx) => setData({ ...data, donors: data.donors.filter((_, i) => i !== idx) })} />;
          case 'people-partners':
            return (
              <div className="space-y-4">
                <h2 className="text-2xl font-bold text-gray-900">Partners</h2>
                <div className="bg-white rounded-lg border border-gray-200 overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead className="bg-gray-50 border-b">
                      <tr><th className="text-left px-4 py-3 font-semibold">Partner Organization</th></tr>
                    </thead>
                    <tbody>
                      {PARTNERS.map(p => (
                        <tr key={p} className="border-b hover:bg-gray-50">
                          <td className="px-4 py-3">{p}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          case 'people-customers':
            return <div className="bg-white p-6 rounded-lg border border-gray-200"><p className="text-gray-600">Customers management</p></div>;
          case 'dashboard-donations':
            return <DonationsModule data={data} selectedLocation={selectedLocation} locations={LOCATIONS} onDataChange={setData} />;
          case 'dashboard-processing':
            return <ProcessingMetricsModule data={data} selectedLocation={selectedLocation} onDataChange={setData} />;
          case 'dashboard-retail':
            return <RetailMetricsModule data={data} selectedLocation={selectedLocation} locations={LOCATIONS} onDataChange={setData} />;
          case 'dashboard-wholesale':
            return <div className="bg-white p-6 rounded-lg border border-gray-200"><p className="text-gray-600">Wholesale Dashboard</p></div>;
          default:
            return <DashboardOverview data={data} selectedLocation={selectedLocation} locations={LOCATIONS} targets={targets} />;
        }
      };

      return (
        <div className="flex h-screen bg-gray-50">
          <Sidebar activeSection={activeSection} onSectionChange={setActiveSection} />
          <div className="flex-1 flex flex-col overflow-hidden">
            <Navbar selectedLocation={selectedLocation} locations={LOCATIONS} onLocationChange={setSelectedLocation} userName="Jared Stoltzfus" />
            <main className="flex-1 overflow-auto p-8">
              {renderContent()}
            </main>
          </div>
        </div>
      );
    }

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BridgeThriftApp />);
  </script>
  <script type="module">
    // Load React, ReactDOM, and Recharts all from esm.sh
    // so they share the same React instance (avoids dual-React hooks error)
    const ReactMod = await import('https://esm.sh/react@18.2.0');
    const ReactDOMMod = await import('https://esm.sh/react-dom@18.2.0');
    const ReactDOMClient = await import('https://esm.sh/react-dom@18.2.0/client');
    const Recharts = await import('https://esm.sh/recharts@2.12.7?deps=react@18.2.0,react-dom@18.2.0');

    window.React = ReactMod.default;
    window.ReactDOM = Object.assign({}, ReactDOMMod, ReactDOMClient);
    window.RechartsLib = Recharts;

    // Manually transform and execute the JSX app code
    const jsx = document.getElementById('app-code').textContent;
    const transformed = Babel.transform(jsx, { presets: ['env', 'react'] }).code;
    const script = document.createElement('script');
    script.textContent = transformed;
    document.body.appendChild(script);
  </script>
</body>
</html>
