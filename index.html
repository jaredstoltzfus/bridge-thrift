<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bridge Thrift</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body, #root {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useMemo } = React;
    const { BarChart, Bar, LineChart, Line, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = window.Recharts;

    // SVG Icon Components
    const Icons = {
      Menu: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
      X: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      ChevronDown: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>,
      Plus: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Edit2: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3"/></svg>,
      Trash2: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
      Download: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
      Calendar: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
      Search: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      Filter: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
      Home: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      Gift: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><path d="M12 7V5c0-1.1.9-2 2-2h0c1.1 0 2 .9 2 2v2M12 7V5c0-1.1-.9-2-2-2h0c-1.1 0-2 .9-2 2v2"/></svg>,
      Truck: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="1" y="6" width="22" height="12" rx="2"/><path d="M1 18v2a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2v-2"/><circle cx="8" cy="18" r="2"/><circle cx="18" cy="18" r="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>,
      BarChart3: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="3" x2="12" y2="21"/><line x1="18" y1="15" x2="18" y2="21"/><line x1="6" y1="9" x2="6" y2="21"/></svg>,
      Users: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
      Settings: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m3.08 3.08l4.24 4.24M1 12h6m6 0h6m-17.78 7.78l4.24-4.24m3.08-3.08l4.24-4.24"/></svg>,
      ShoppingCart: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>,
      MapPin: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
      User: (props) => <svg xmlns="http://www.w3.org/2000/svg" width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
    };

    // ============================================================================
    // DATA INITIALIZATION & STORAGE
    // ============================================================================

    const LOCATIONS = [
      { id: 1, name: 'Clairemont', phone: '858-352-6374', address: '4220 Balboa Ave', city: 'San Diego', state: 'CA' },
      { id: 2, name: 'Glassell Park', phone: '323-474-7890', address: '3516 N Eagle Rock Blvd', city: 'Los Angeles', state: 'CA' },
      { id: 3, name: 'Highland Park', phone: '323-474-6424', address: '5817 Figueroa St', city: 'Los Angeles', state: 'CA' },
      { id: 4, name: 'Spring Valley', phone: '619-470-1234', address: '9617 Campo Rd', city: 'Spring Valley', state: 'CA' },
      { id: 5, name: 'Pacific Beach', phone: '858-352-6087', address: '1772 Garnet Ave', city: 'San Diego', state: 'CA' }
    ];

    const CATEGORIES = [
      { id: 1, name: 'Clothing', value: 5, modules: ['Processing', 'Retail', 'Donations', 'Wholesale'] },
      { id: 2, name: 'Shoes', value: 4, modules: ['Processing', 'Retail', 'Donations', 'Wholesale'] },
      { id: 3, name: 'Jewelry', value: 8, modules: ['Retail', 'Donations'] },
      { id: 4, name: 'Accessories', value: 3, modules: ['Retail', 'Donations'] },
      { id: 5, name: 'Linens', value: 2, modules: ['Processing', 'Retail'] },
      { id: 6, name: 'Household', value: 6, modules: ['Retail', 'Donations'] },
      { id: 7, name: 'Electronics', value: 15, modules: ['Retail', 'Donations'] },
      { id: 8, name: 'Media', value: 2, modules: ['Retail'] },
      { id: 9, name: 'Furniture', value: 20, modules: ['Retail', 'Donations'] },
      { id: 10, name: 'Seasonal', value: 4, modules: ['Retail', 'Donations'] },
      { id: 11, name: 'Paper Bag', value: 0.50, modules: ['Donations'] },
      { id: 12, name: 'Outlet', value: 1, modules: ['Retail'] },
      { id: 13, name: 'Cash Adjustments', value: 0, modules: ['Retail'] }
    ];

    const PARTNERS = [
      'Hope for San Diego', 'Alpha Project', 'Barabbas Road Church', 'Bridge of Hope',
      'Second Chance', 'Wounded Warrior Project', 'We See You San Diego',
      'Mission Valley Christian Fellowship', 'St Vincent De Paul', 'Community Outreach',
      'Local Food Bank', 'Youth Services', 'Homeless Connect', 'Crisis Response Team'
    ];

    const initializeData = () => {
      const now = new Date();
      const donations = [];
      const retailSummaries = [];
      const processingSummaries = [];
      const pickupsSummaries = [];
      const truckStops = [];
      const events = [];
      const benevolenceGifts = [];

      // Generate 30 days of sample data
      for (let d = 0; d < 30; d++) {
        const date = new Date(now);
        date.setDate(date.getDate() - d);
        const dateStr = date.toISOString().split('T')[0];

        LOCATIONS.forEach((location, locIdx) => {
          // Donations
          donations.push({
            id: `DON-${dateStr}-${locIdx}`,
            date: dateStr,
            locationId: location.id,
            donorFirstName: ['John', 'Jane', 'Michael', 'Sarah'][Math.floor(Math.random() * 4)],
            donorLastName: ['Smith', 'Johnson', 'Williams', 'Brown'][Math.floor(Math.random() * 4)],
            donorEmail: `donor${locIdx}@example.com`,
            donorPhone: '619-555-0100',
            partner: PARTNERS[Math.floor(Math.random() * PARTNERS.length)],
            status: ['Scheduled', 'Received', 'Closed'][Math.floor(Math.random() * 3)],
            totalItems: Math.floor(Math.random() * 200) + 20,
            suggestedValue: Math.floor(Math.random() * 2000) + 200,
            totalValue: Math.floor(Math.random() * 1500) + 150
          });

          // Retail Summaries
          const grossSales = Math.floor(Math.random() * 6000) + 1500;
          retailSummaries.push({
            id: `RET-${dateStr}-${locIdx}`,
            date: dateStr,
            locationId: location.id,
            grossSales,
            netSales: Math.floor(grossSales * 0.92),
            salesTax: Math.floor(grossSales * 0.08),
            taxableSales: Math.floor(grossSales * 0.7),
            nonTaxableSales: Math.floor(grossSales * 0.3),
            unreconciled: Math.floor(Math.random() * 100),
            laborHours: Math.floor(Math.random() * 8) + 4,
            hoursOpen: 8,
            ringsAtRegister: Math.floor(Math.random() * 100) + 20,
            donations: Math.floor(Math.random() * 500),
            piecesStocked: Math.floor(Math.random() * 300) + 50,
            depositAmount: Math.floor(grossSales * 0.8),
            creditCardDeposits: [
              Math.floor(grossSales * 0.3),
              Math.floor(grossSales * 0.3),
              Math.floor(grossSales * 0.2),
              0
            ],
            payoutAmount: Math.floor(Math.random() * 200),
            notes: '',
            categories: CATEGORIES.reduce((acc, cat) => {
              acc[cat.name] = {
                netSales: Math.floor(Math.random() * 500) + 50,
                quantity: Math.floor(Math.random() * 50) + 5,
                pulls: Math.floor(Math.random() * 100) + 10
              };
              return acc;
            }, {}),
            paymentMethods: {
              cash: Math.floor(grossSales * 0.4),
              creditCard: Math.floor(grossSales * 0.5),
              giftCard: Math.floor(grossSales * 0.1)
            }
          });

          // Processing Summaries
          processingSummaries.push({
            id: `PROC-${dateStr}-${locIdx}`,
            date: dateStr,
            locationId: location.id,
            createdBy: 'Staff',
            laborHours: Math.floor(Math.random() * 6) + 2,
            unitsProcessed: Math.floor(Math.random() * 400) + 100
          });

          // Pickups
          pickupsSummaries.push({
            id: `PICK-${dateStr}-${locIdx}`,
            date: dateStr,
            locationId: location.id,
            donor: ['John Donor', 'Jane Giver', 'Anonymous'][Math.floor(Math.random() * 3)],
            items: Math.floor(Math.random() * 150) + 20
          });

          // Truck Stops
          if (Math.random() > 0.7) {
            truckStops.push({
              id: `TRUCK-${dateStr}-${locIdx}`,
              date: dateStr,
              locationId: location.id,
              driver: ['Driver A', 'Driver B', 'Driver C'][Math.floor(Math.random() * 3)],
              notes: 'Regular pickup'
            });
          }

          // Benevolence Gifts
          if (Math.random() > 0.8) {
            benevolenceGifts.push({
              id: `BEN-${dateStr}-${locIdx}`,
              date: dateStr,
              recipient: 'Community Member',
              amount: Math.floor(Math.random() * 500) + 50,
              description: 'Clothing donation'
            });
          }
        });
      }

      return {
        donations,
        retailSummaries,
        processingSummaries,
        pickupsSummaries,
        truckStops,
        events: [
          { id: 1, date: new Date().toISOString().split('T')[0], name: 'Community Donation Drive', locationId: 1, description: 'Monthly drive' }
        ],
        benevolenceGifts,
        donors: [
          { id: 1, firstName: 'John', lastName: 'Smith', email: 'john@example.com', phone: '619-555-0100', totalDonations: 15, totalValue: 3000 },
          { id: 2, firstName: 'Jane', lastName: 'Johnson', email: 'jane@example.com', phone: '619-555-0101', totalDonations: 8, totalValue: 1500 }
        ],
        users: [
          { id: 1, name: 'Jared Stoltzfus', email: 'jared@bridgethrift.org', role: 'Admin' },
          { id: 2, name: 'Staff Member', email: 'staff@bridgethrift.org', role: 'Staff' }
        ],
        callCenterSummaries: [],
        distributionSummaries: [],
        payrollSummaries: [],
        wholesaleSummaries: []
      };
    };

    // ============================================================================
    // UTILITY FUNCTIONS
    // ============================================================================

    const formatCurrency = (value) => {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(value);
    };

    const formatDate = (dateStr) => {
      return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    };

    // CSV Export
    const downloadCSV = (data, filename) => {
      if (!data || data.length === 0) {
        alert('No data to export');
        return;
      }
      const headers = Object.keys(data[0]);
      const csv = [
        headers.join(','),
        ...data.map(row => headers.map(header => {
          const val = row[header];
          if (typeof val === 'object') return JSON.stringify(val);
          if (typeof val === 'string' && val.includes(',')) return `"${val}"`;
          return val;
        }).join(','))
      ].join('\n');

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      window.URL.revokeObjectURL(url);
    };

    // ============================================================================
    // GAUGE COMPONENT
    // ============================================================================

    const Gauge = ({ value, max = 100, label, color = '#4CAF50' }) => {
      const percentage = (value / max) * 100;
      const rotation = (percentage / 100) * 180 - 90;

      return (
        <div className="flex flex-col items-center">
          <div className="relative w-32 h-16">
            <svg viewBox="0 0 200 100" className="w-full h-full">
              <path d="M 20 100 A 80 80 0 0 1 180 100" stroke="#e0e0e0" strokeWidth="8" fill="none" />
              <path d="M 20 100 A 80 80 0 0 1 120 20" stroke="#4CAF50" strokeWidth="8" fill="none" />
              <path d="M 120 20 A 80 80 0 0 1 160 40" stroke="#FF9800" strokeWidth="8" fill="none" />
              <path d="M 160 40 A 80 80 0 0 1 180 100" stroke="#f44336" strokeWidth="8" fill="none" />
              <line
                x1="100" y1="100" x2={100 + 70 * Math.cos((rotation * Math.PI) / 180)}
                y1={100 + 70 * Math.sin((rotation * Math.PI) / 180)}
                stroke="#333" strokeWidth="4" strokeLinecap="round"
              />
              <circle cx="100" cy="100" r="6" fill="#333" />
              <text x="100" y="130" textAnchor="middle" fontSize="16" fontWeight="bold" fill="#333">
                {value}
              </text>
            </svg>
          </div>
          <p className="mt-2 text-sm font-medium text-gray-700">{label}</p>
        </div>
      );
    };

    // ============================================================================
    // COMPONENTS
    // ============================================================================

    const Navbar = ({ selectedLocation, locations, onLocationChange, userName }) => (
      <div className="bg-white border-b border-gray-200 shadow-sm">
        <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
          <div className="flex items-center gap-2">
            <div className="w-8 h-8 bg-green-700 rounded-lg flex items-center justify-center text-white font-bold">B</div>
            <span className="text-xl font-bold text-gray-900">Bridge Thrift</span>
          </div>
          <div className="flex items-center gap-6">
            <div className="flex items-center gap-2">
              <Icons.MapPin size={18} className="text-green-700" />
              <select
                value={selectedLocation}
                onChange={(e) => onLocationChange(Number(e.target.value))}
                className="px-3 py-1 border border-gray-300 rounded-lg text-sm"
              >
                {locations.map(loc => (
                  <option key={loc.id} value={loc.id}>{loc.name}</option>
                ))}
              </select>
            </div>
            <div className="flex items-center gap-2 text-gray-700">
              <Icons.User size={18} />
              <span className="text-sm">{userName}</span>
            </div>
          </div>
        </div>
      </div>
    );

    const Sidebar = ({ activeSection, onSectionChange }) => {
      const [expanded, setExpanded] = useState({
        dashboard: true,
        metrics: false,
        administration: false,
        people: false,
        pos: false
      });

      const toggleExpand = (section) => {
        setExpanded(prev => ({ ...prev, [section]: !prev[section] }));
      };

      const NavItem = ({ icon: Icon, label, onClick, active, hasSubmenu, onToggle }) => (
        <button
          onClick={() => {
            if (hasSubmenu) onToggle();
            else onClick();
          }}
          className={`w-full flex items-center justify-between gap-3 px-4 py-2 rounded-lg transition ${
            active ? 'bg-green-100 text-green-700 font-medium' : 'text-gray-700 hover:bg-gray-100'
          }`}
        >
          <div className="flex items-center gap-3">
            <Icon size={18} />
            <span className="text-sm">{label}</span>
          </div>
          {hasSubmenu && <Icons.ChevronDown size={16} className={`transition ${expanded[label.toLowerCase().replace(/ /g, '')] ? 'rotate-180' : ''}`} />}
        </button>
      );

      const SubNavItem = ({ label, onClick, active }) => (
        <button
          onClick={onClick}
          className={`w-full text-left pl-10 pr-4 py-2 text-sm transition ${
            active ? 'text-green-700 font-medium bg-green-50' : 'text-gray-600 hover:text-gray-900'
          }`}
        >
          {label}
        </button>
      );

      return (
        <div className="w-64 bg-white border-r border-gray-200 p-4 space-y-2 h-screen overflow-y-auto">
          <div className="mb-6 pb-6 border-b border-gray-200">
            <h3 className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Menu</h3>
          </div>

          <div>
            <NavItem
              icon={Icons.Home}
              label="Dashboard"
              hasSubmenu
              onToggle={() => toggleExpand('dashboard')}
              active={activeSection === 'overview' || activeSection === 'dashboard-donations'}
            />
            {expanded.dashboard && (
              <>
                <SubNavItem label="Overview" onClick={() => onSectionChange('overview')} active={activeSection === 'overview'} />
                <SubNavItem label="Donations" onClick={() => onSectionChange('dashboard-donations')} active={activeSection === 'dashboard-donations'} />
                <SubNavItem label="Processing" onClick={() => onSectionChange('dashboard-processing')} active={activeSection === 'dashboard-processing'} />
                <SubNavItem label="Retail" onClick={() => onSectionChange('dashboard-retail')} active={activeSection === 'dashboard-retail'} />
                <SubNavItem label="Wholesale" onClick={() => onSectionChange('dashboard-wholesale')} active={activeSection === 'dashboard-wholesale'} />
              </>
            )}
          </div>

          <NavItem icon={Icons.Gift} label="Donations" onClick={() => onSectionChange('donations')} active={activeSection === 'donations'} />
          <NavItem icon={Icons.Truck} label="Truck Stops" onClick={() => onSectionChange('truck_stops')} active={activeSection === 'truck_stops'} />
          <NavItem icon={Icons.Calendar} label="Events" onClick={() => onSectionChange('events')} active={activeSection === 'events'} />

          <div>
            <NavItem
              icon={Icons.BarChart3}
              label="Metrics"
              hasSubmenu
              onToggle={() => toggleExpand('metrics')}
              active={activeSection?.startsWith('metrics-')}
            />
            {expanded.metrics && (
              <>
                <SubNavItem label="Processing" onClick={() => onSectionChange('metrics-processing')} active={activeSection === 'metrics-processing'} />
                <SubNavItem label="Retail" onClick={() => onSectionChange('metrics-retail')} active={activeSection === 'metrics-retail'} />
                <SubNavItem label="Wholesale" onClick={() => onSectionChange('metrics-wholesale')} active={activeSection === 'metrics-wholesale'} />
                <SubNavItem label="Benevolence" onClick={() => onSectionChange('metrics-benevolence')} active={activeSection === 'metrics-benevolence'} />
                <SubNavItem label="Call Center" onClick={() => onSectionChange('metrics-call-center')} active={activeSection === 'metrics-call-center'} />
                <SubNavItem label="Pickups" onClick={() => onSectionChange('metrics-pickups')} active={activeSection === 'metrics-pickups'} />
              </>
            )}
          </div>

          <div>
            <NavItem
              icon={Icons.Settings}
              label="Administration"
              hasSubmenu
              onToggle={() => toggleExpand('administration')}
              active={activeSection?.startsWith('admin-')}
            />
            {expanded.administration && (
              <>

      const totalTransactions = filteredRetail.reduce((sum, r) => sum + r.ringsAtRegister, 0);
      const totalUnits = filteredRetail.reduce((sum, r) => sum + r.piecesStocked, 0);
      const avgPrice = totalUnits > 0 ? totalSales / totalUnits : 0;

      const salesByCategory = CATEGORIES.reduce((acc, cat) => {
        const catSales = filteredRetail.reduce((sum, r) => sum + (r.categories[cat.name]?.netSales || 0), 0);
        acc.push({ name: cat.name, sales: catSales });
        return acc;
      }, []).sort((a, b) => b.sales - a.sales);

      const dailySales = filteredRetail.slice(0, 14).reverse().map(r => ({
        date: formatDate(r.date).split(',')[0],

        return {
          category: cat.name,
          processed: units,
          sold,
          sellThrough: units > 0 ? ((sold / units) * 100).toFixed(1) : 0,
          avgPrice: units > 0 ? (filteredRetail.reduce((sum, r) => sum + (r.categories[cat.name]?.netSales || 0), 0) / units).toFixed(2) : 0

            return <RetailMetricsModule data={data} selectedLocation={selectedLocation} locations={LOCATIONS} onDataChange={setData} />;
          case 'metrics-wholesale':
            return <ListModule title="Wholesale Summaries" data={data.wholesaleSummaries || []} columns={['date', 'location']} onEdit={() => {}} onDelete={() => {}} />;
          case 'metrics-benevolence':
            return <ListModule title="Benevolence Gifts" data={data.benevolenceGifts} columns={['date', 'recipient', 'amount', 'description']} onEdit={() => {}} onDelete={(idx) => setData({ ...data, benevolenceGifts: data.benevolenceGifts.filter((_, i) => i !== idx) })} />;
          case 'metrics-call-center':
            return <ListModule title="Call Center Summaries" data={data.callCenterSummaries || []} columns={['date', 'location', 'calls']} onEdit={() => {}} onDelete={() => {}} />;
          case 'metrics-pickups':
            return <PickupsModule data={data} selectedLocation={selectedLocation} onDataChange={setData} />;
          case 'admin-categories':
            return <CategoriesModule data={data} onDataChange={setData} />;
          case 'admin-locations':
            return <LocationsModule data={data} onDataChange={setData} />;
          case 'admin-users':
            return <ListModule title="Users" data={data.users} columns={['name', 'email', 'role']} onEdit={() => {}} onDelete={(idx) => setData({ ...data, users: data.users.filter((_, i) => i !== idx) })} />;
          case 'admin-payment':
            return <div className="bg-white p-6 rounded-lg border border-gray-200"><p className="text-gray-600">Payment Methods management</p></div>;
          case 'admin-targets':
            return <div className="bg-white p-6 rounded-lg border border-gray-200"><p className="text-gray-600">Sales Targets management</p></div>;
          case 'people-donors':
            return <ListModule title="Donors" data={data.donors} columns={['firstName', 'lastName', 'email', 'phone']} onEdit={() => {}} onDelete={(idx) => setData({ ...data, donors: data.donors.filter((_, i) => i !== idx) })} />;
          case 'people-partners':
            return (
              <div className="space-y-4">
                <h2 className="text-2xl font-bold text-gray-900">Partners</h2>
                <div className="bg-white rounded-lg border border-gray-200 overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead className="bg-gray-50 border-b">
                      <tr><th className="text-left px-4 py-3 font-semibold">Partner Organization</th></tr>
                    </thead>
                    <tbody>
                      {PARTNERS.map(p => (
                        <tr key={p} className="border-b hover:bg-gray-50">
                          <td className="px-4 py-3">{p}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          case 'people-customers':
            return <div className="bg-white p-6 rounded-lg border border-gray-200"><p className="text-gray-600">Customers management</p></div>;
          case 'pos-drawers':
            return <div className="bg-white p-6 rounded-lg border border-gray-200"><p className="text-gray-600">Cash Drawer management</p></div>;
          case 'pos-transactions':
            return <div className="bg-white p-6 rounded-lg border border-gray-200"><p className="text-gray-600">Point of Sale Transactions</p></div>;
          case 'dashboard-donations':
            return <DonationsModule data={data} selectedLocation={selectedLocation} locations={LOCATIONS} onDataChange={setData} />;
          case 'dashboard-processing':
            return <ProcessingMetricsModule data={data} selectedLocation={selectedLocation} onDataChange={setData} />;
          case 'dashboard-retail':
            return <RetailMetricsModule data={data} selectedLocation={selectedLocation} locations={LOCATIONS} onDataChange={setData} />;
          case 'dashboard-wholesale':
            return <div className="bg-white p-6 rounded-lg border border-gray-200"><p className="text-gray-600">Wholesale Dashboard</p></div>;
          default:
            return <DashboardOverview data={data} selectedLocation={selectedLocation} locations={LOCATIONS} />;
        }
      };

      return (
        <div className="flex h-screen bg-gray-50">
          <Sidebar activeSection={activeSection} onSectionChange={setActiveSection} />
          <div className="flex-1 flex flex-col overflow-hidden">
            <Navbar selectedLocation={selectedLocation} locations={LOCATIONS} onLocationChange={setSelectedLocation} userName="Jared Stoltzfus" />
            <main className="flex-1 overflow-auto p-8">
              {renderContent()}
            </main>
          </div>
        </div>
      );
    }

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BridgeThriftApp />);
  </script>
</body>
</html>
